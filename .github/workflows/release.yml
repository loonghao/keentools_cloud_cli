name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: Release tag to build and publish
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to build and publish
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: "600"
  CARGO_NET_RETRY: "10"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  prepare-release:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag_name }}

      - name: Extract version from tag
        id: metadata
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: keentools-cloud
            archive_name: keentools-cloud-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: keentools-cloud
            archive_name: keentools-cloud-x86_64-unknown-linux-musl.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: keentools-cloud
            archive_name: keentools-cloud-aarch64-unknown-linux-gnu.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: keentools-cloud.exe
            archive_name: keentools-cloud-x86_64-pc-windows-msvc.zip
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: keentools-cloud
            archive_name: keentools-cloud-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: keentools-cloud
            archive_name: keentools-cloud-aarch64-apple-darwin.tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag_name }}

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.15"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-0.8.15-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Add Rust target
        run: vx rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Fix MSVC linker (remove Git's link.exe)
        if: runner.os == 'Windows'
        run: Remove-Item 'C:\Program Files\Git\usr\bin\link.exe' -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Sync Cargo.lock
        run: vx cargo update --workspace

      - name: Build release binary
        run: vx just build-release-target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package tarball
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/${{ matrix.archive_name }} ${{ matrix.binary_name }}

      - name: Package zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" -DestinationPath "dist/${{ matrix.archive_name }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  github-release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "*"
          merge-multiple: true

      - name: Create versioned copies of archives
        # Unversioned names (e.g. keentools-cloud-x86_64-unknown-linux-gnu.tar.gz)
        # allow install scripts to use the stable /releases/latest/download/ URL.
        # Versioned names (e.g. keentools-cloud-v0.2.0-x86_64-...) allow pinning.
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          shopt -s nullglob
          for file in artifacts/keentools-cloud-*.tar.gz artifacts/keentools-cloud-*.zip; do
            base_name="$(basename "$file")"
            if [[ "$base_name" == *.tar.gz ]]; then
              extension="tar.gz"
              stem="${base_name%.tar.gz}"
            else
              extension="${base_name##*.}"
              stem="${base_name%.*}"
            fi
            versioned="${stem/keentools-cloud-/keentools-cloud-v${RELEASE_VERSION}-}.${extension}"
            cp "$file" "artifacts/${versioned}"
          done

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum keentools-cloud-* > keentools-cloud-checksums.txt
          cat keentools-cloud-checksums.txt

      - name: Prepare fallback release notes
        shell: bash
        run: |
          cat > RELEASE_NOTES.md <<'EOF'
          ## Installation

          ### Linux / macOS

          ```bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
          ```

          ### Windows (PowerShell)

          ```powershell
          irm https://raw.githubusercontent.com/${{ github.repository }}/main/install.ps1 | iex
          ```

          ### Manual download

          Download the binary for your platform from the assets below.

          > **Note**: This is an unofficial project not affiliated with KeenTools.
          > Set `KEENTOOLS_API_URL` and `KEENTOOLS_API_TOKEN` before use.
          EOF

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          release_url="https://github.com/${REPOSITORY}/releases/tag/${RELEASE_TAG}"
          if gh release view "${RELEASE_TAG}" --repo "${REPOSITORY}" > /dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" artifacts/* --repo "${REPOSITORY}" --clobber
          else
            gh release create "${RELEASE_TAG}" artifacts/* --repo "${REPOSITORY}" \
              --title "${RELEASE_TAG}" --notes-file RELEASE_NOTES.md
          fi
          echo "Uploaded assets to ${release_url}"
