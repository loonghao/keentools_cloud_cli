name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_HTTP_TIMEOUT: "600"
  CARGO_NET_RETRY: "10"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.15"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-0.8.15-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Add Rust components
        run: vx rustup component add clippy rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Sync Cargo.lock
        run: vx cargo update --workspace

      - name: Run quality checks
        run: vx just ci

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.15"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-0.8.15-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Fix MSVC linker (remove Git's link.exe)
        if: runner.os == 'Windows'
        run: Remove-Item 'C:\Program Files\Git\usr\bin\link.exe' -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.os }}

      - name: Sync Cargo.lock
        run: vx cargo update --workspace

      - name: Run tests
        run: vx just test

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [quality, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Setup vx
        uses: loonghao/vx@main
        with:
          version: "0.8.15"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key-prefix: vx-0.8.15-${{ runner.os }}-${{ runner.arch }}

      - name: Setup tools (vx)
        run: vx setup

      - name: Add Rust target
        run: vx rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Fix MSVC linker (remove Git's link.exe)
        if: runner.os == 'Windows'
        run: Remove-Item 'C:\Program Files\Git\usr\bin\link.exe' -Force -ErrorAction SilentlyContinue
        shell: pwsh

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.target }}

      - name: Sync Cargo.lock
        run: vx cargo update --workspace

      - name: Build release binary
        run: vx just build-release-target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
