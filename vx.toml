[tools]
just = "latest"
rust = "stable"
node = "22"

[settings]
auto_install = true
parallel_install = true

[scripts]
check = "vx cargo check"
ci = "vx just ci"
fmt = "vx cargo fmt --all"
fmt-check = "vx cargo fmt --all -- --check"
lint = "vx cargo clippy -- -D warnings"
test = "vx cargo test --locked"
